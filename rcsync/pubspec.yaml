name: rcsync
version: 1.0.0+1
publish_to: none
description: Gestión de eventos RC.
environment:
  sdk: ">=2.18.5 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.2
  get: ^4.6.6
  supabase_flutter: ^2.8.3
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  stylish_bottom_bar: ^1.1.1
  flutter_neat_and_clean_calendar: ^0.4.4
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.1
  intl: ^0.20.2
  image_picker: ^1.2.1
  file_picker: ^10.3.10

dev_dependencies:
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  assets:
    - .env
    - assets/images/
  uses-material-design: true

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/rcsynctrans.png"