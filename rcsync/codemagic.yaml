workflows:
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m1 # Máquina estándar para compilación rápida
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        # Aquí definirás las variables de Supabase en el panel de Codemagic
        SUPABASE_URL: ${SUPABASE_URL}
        SUPABASE_ANONKEY: ${SUPABASE_ANONKEY}
    scripts:
      - name: Set up .env file
        script: |
          # Genera el archivo .env necesario para flutter_dotenv
          echo "SUPABASE_URL=$SUPABASE_URL" > .env
          echo "SUPABASE_ANONKEY=$SUPABASE_ANONKEY" >> .env
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter build iOS
        script: |
          # Compila el archivo .ipa sin necesidad de firma para pruebas rápidas
          # O usa --release para producción
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - /tmp/build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - tu-correo@ejemplo.com